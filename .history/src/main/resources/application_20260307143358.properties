# 1. App Identity
spring.application.name=brokerage-crm
server.port=8080

# 2. PostgreSQL Connection (The "Persistence" Layer)
# Ensure you have created a database named 'brokerage_crm' in pgAdmin first!
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/brokerage_crm}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# 3. JPA / Hibernate (The "Magic" Layer)
# 'update' automatically creates tables based on our Java @Entity classes
spring.jpa.hibernate.ddl-auto=update
# 'show-sql' prints the database commands to your IDE console for learning
spring.jpa.show-sql=true
# This helps Hibernate format the SQL so it's readable in your console
spring.jpa.properties.hibernate.format_sql=true